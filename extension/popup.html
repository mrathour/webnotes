<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
      color: #1e1b4b;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      color: #312e81;
      margin-bottom: 0;
    }

    .btn-help {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      color: #4f46e5;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
    }
    .btn-help:hover { background: #e0e7ff; }

    .section { margin-bottom: 4px; }

    .label {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      color: #059669;
      margin-bottom: 4px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      color: #1e1b4b;
      background: white;
      margin-bottom: 8px;
      cursor: pointer;
    }
    select:focus { outline: 2px solid #4f46e5; border-color: transparent; }
    select:disabled { background: #f9fafb; color: #9ca3af; cursor: default; }

    button {
      width: 100%;
      padding: 9px 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }
    button:hover:not(:disabled) { background: #4338ca; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-link {
      background: none;
      border: none;
      color: #6b7280;
      font-size: 11px;
      font-weight: 400;
      cursor: pointer;
      padding: 0;
      width: auto;
      text-decoration: underline;
    }
    .btn-link:hover { color: #4f46e5; }

    hr { border: none; border-top: 1px solid #e5e7eb; margin: 12px 0; }

    .error { font-size: 12px; color: #dc2626; margin-top: 8px; }

    .hint {
      margin-top: 10px;
      font-size: 12px;
      color: #6b7280;
      line-height: 1.4;
    }

    .btn-secondary {
      background: white;
      color: #4f46e5;
      border: 1px solid #4f46e5;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .btn-secondary:hover:not(:disabled) { background: #eef2ff; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 12px;
      height: 12px;
      border: 2px solid rgba(79,70,229,0.25);
      border-top-color: #4f46e5;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .sync-log {
      display: none;
      margin-bottom: 8px;
      padding: 8px 10px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
      color: #374151;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.6;
    }
    .sync-log.visible { display: block; }
    .log-error { color: #dc2626; }
    .log-success { color: #059669; }
  </style>
</head>
<body>
  <div class="header">
    <h2>WebNotes</h2>
    <button class="btn-help" id="helpBtn" title="Help">?</button>
  </div>

  <!-- State 1: Not connected to Notion -->
  <div id="s-disconnected" class="section" hidden>
    <p class="label">Connect to Notion to sync your notes to a database.</p>
    <button id="connectBtn">Connect to Notion</button>
  </div>

  <!-- State 2: Connected, no target selected -->
  <div id="s-picker" class="section" hidden>
    <div class="badge">&#10003; <span id="workspaceName1"></span></div>
    <p class="label" style="margin-top: 10px;">Select a page or database:</p>
    <select id="targetSelect" disabled>
      <option value="">— loading... —</option>
    </select>
    <button id="saveTargetBtn" disabled>Save Selection</button>
    <p id="pickerError" class="error" hidden></p>
  </div>

  <!-- State 3: Connected and target configured -->
  <div id="s-configured" class="section" hidden>
    <div class="badge">&#10003; <span id="workspaceName2"></span></div>
    <div class="row" style="margin-top: 6px;">
      <div class="badge">&#10003; <span id="targetName"></span></div>
      <button class="btn-link" id="changeTargetBtn">change</button>
    </div>
  </div>

  <p id="authError" class="error" hidden></p>

  <hr />

  <button id="makeNotesBtn" class="btn-secondary">Sync Notes with Notion</button>
  <div id="syncLog" class="sync-log"></div>

  <button id="pickBtn">Pick Element</button>
  <p class="hint">Hover over any element on the page and click to save. Press ESC to cancel.</p>

  <script src="popup.js"></script>
</body>
</html>
